name: "Pi Security Review"
description: "Provider-neutral Pi security review context/final-report gate for GitHub Actions"
author: "pi-security-review maintainers"

inputs:
  base:
    description: "Base ref for git diff"
    required: false
    default: "origin/${{ github.base_ref }}"
  head:
    description: "Head ref for git diff"
    required: false
    default: "HEAD"
  output:
    description: "JSON artifact path"
    required: false
    default: ".pi/security-review/ci-context.json"
  markdown:
    description: "Markdown report artifact path"
    required: false
    default: ".pi/security-review/ci-report.md"
  model:
    description: "Requested Pi model metadata to record; does not configure provider auth"
    required: false
    default: ""
  final-report:
    description: "Model-produced report containing pi-security-review JSON marker"
    required: false
    default: ""
  scan-instructions-file:
    description: "Repo-relative custom security scan instructions file"
    required: false
    default: ""
  filter-instructions-file:
    description: "Repo-relative custom false-positive filtering instructions file"
    required: false
    default: ""
  scan-instructions-text:
    description: "Inline custom security scan instructions"
    required: false
    default: ""
  filter-instructions-text:
    description: "Inline custom false-positive filtering instructions"
    required: false
    default: ""
  include:
    description: "Comma-separated include globs overriding repo config include"
    required: false
    default: ""
  exclude:
    description: "Comma-separated exclude globs appended to repo config exclude"
    required: false
    default: ""
  paths:
    description: "Comma-separated focus paths for git diff"
    required: false
    default: ""
  exclude-directories:
    description: "Comma-separated directories to exclude; upstream-compatible alias"
    required: false
    default: ""
  upload-results:
    description: "Upload JSON and Markdown results as workflow artifact"
    required: false
    default: "true"
  retention-days:
    description: "Artifact retention days for uploaded results"
    required: false
    default: "7"
  comment:
    description: "Post PR comment. Requires yes=true and final-report unless allow-artifact-comment=true"
    required: false
    default: "false"
  pr:
    description: "Pull request number for optional comment"
    required: false
    default: ""
  yes:
    description: "Explicit approval for GitHub comment mutation"
    required: false
    default: "false"
  allow-artifact-comment:
    description: "Maintainer override to comment artifact-only context; not recommended for security results"
    required: false
    default: "false"
  fail-on-high:
    description: "Fail when final report contains HIGH findings"
    required: false
    default: "false"
  fail-on-medium:
    description: "Fail when final report contains MEDIUM or HIGH findings"
    required: false
    default: "false"

outputs:
  findings-count:
    description: "Total kept findings in final/artifact report"
    value: ${{ steps.summary.outputs.findings_count }}
  high-count:
    description: "HIGH findings count"
    value: ${{ steps.summary.outputs.high_count }}
  medium-count:
    description: "MEDIUM findings count"
    value: ${{ steps.summary.outputs.medium_count }}
  mode:
    description: "CI mode: artifact-only or external-final-report"
    value: ${{ steps.summary.outputs.mode }}
  results-file:
    description: "JSON artifact path"
    value: ${{ inputs.output }}
  markdown-file:
    description: "Markdown artifact path"
    value: ${{ inputs.markdown }}

runs:
  using: "composite"
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install package dependencies
      shell: bash
      run: bun install --frozen-lockfile
      working-directory: ${{ github.action_path }}

    - name: Run Pi security review CI
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        ACTION_PATH: ${{ github.action_path }}
        SR_INPUT_BASE: ${{ inputs.base }}
        SR_INPUT_HEAD: ${{ inputs.head }}
        SR_INPUT_OUTPUT: ${{ inputs.output }}
        SR_INPUT_MARKDOWN: ${{ inputs.markdown }}
        SR_INPUT_MODEL: ${{ inputs.model }}
        SR_INPUT_FINAL_REPORT: ${{ inputs.final-report }}
        SR_INPUT_SCAN_INSTRUCTIONS_FILE: ${{ inputs.scan-instructions-file }}
        SR_INPUT_FILTER_INSTRUCTIONS_FILE: ${{ inputs.filter-instructions-file }}
        SR_INPUT_SCAN_INSTRUCTIONS_TEXT: ${{ inputs.scan-instructions-text }}
        SR_INPUT_FILTER_INSTRUCTIONS_TEXT: ${{ inputs.filter-instructions-text }}
        SR_INPUT_INCLUDE: ${{ inputs.include }}
        SR_INPUT_EXCLUDE: ${{ inputs.exclude }}
        SR_INPUT_PATHS: ${{ inputs.paths }}
        SR_INPUT_EXCLUDE_DIRECTORIES: ${{ inputs.exclude-directories }}
        SR_INPUT_COMMENT: ${{ inputs.comment }}
        SR_INPUT_PR: ${{ inputs.pr }}
        SR_INPUT_YES: ${{ inputs.yes }}
        SR_INPUT_ALLOW_ARTIFACT_COMMENT: ${{ inputs.allow-artifact-comment }}
        SR_INPUT_FAIL_ON_HIGH: ${{ inputs.fail-on-high }}
        SR_INPUT_FAIL_ON_MEDIUM: ${{ inputs.fail-on-medium }}
      run: |
        set -euo pipefail
        args=("--base" "$SR_INPUT_BASE" "--head" "$SR_INPUT_HEAD" "--output" "$SR_INPUT_OUTPUT" "--markdown" "$SR_INPUT_MARKDOWN")
        if [ -n "$SR_INPUT_MODEL" ]; then args+=("--model" "$SR_INPUT_MODEL"); fi
        if [ -n "$SR_INPUT_FINAL_REPORT" ]; then args+=("--final-report" "$SR_INPUT_FINAL_REPORT"); fi
        if [ -n "$SR_INPUT_SCAN_INSTRUCTIONS_FILE" ]; then args+=("--scan-instructions-file" "$SR_INPUT_SCAN_INSTRUCTIONS_FILE"); fi
        if [ -n "$SR_INPUT_FILTER_INSTRUCTIONS_FILE" ]; then args+=("--filter-instructions-file" "$SR_INPUT_FILTER_INSTRUCTIONS_FILE"); fi
        if [ -n "$SR_INPUT_SCAN_INSTRUCTIONS_TEXT" ]; then args+=("--scan-instructions-text" "$SR_INPUT_SCAN_INSTRUCTIONS_TEXT"); fi
        if [ -n "$SR_INPUT_FILTER_INSTRUCTIONS_TEXT" ]; then args+=("--filter-instructions-text" "$SR_INPUT_FILTER_INSTRUCTIONS_TEXT"); fi
        if [ -n "$SR_INPUT_INCLUDE" ]; then args+=("--include" "$SR_INPUT_INCLUDE"); fi
        if [ -n "$SR_INPUT_EXCLUDE" ]; then args+=("--exclude" "$SR_INPUT_EXCLUDE"); fi
        if [ -n "$SR_INPUT_PATHS" ]; then args+=("--paths" "$SR_INPUT_PATHS"); fi
        if [ -n "$SR_INPUT_EXCLUDE_DIRECTORIES" ]; then args+=("--exclude-directories" "$SR_INPUT_EXCLUDE_DIRECTORIES"); fi
        if [ "$SR_INPUT_COMMENT" = "true" ]; then args+=("--comment"); fi
        if [ -n "$SR_INPUT_PR" ]; then args+=("--pr" "$SR_INPUT_PR"); fi
        if [ "$SR_INPUT_YES" = "true" ]; then args+=("--yes"); fi
        if [ "$SR_INPUT_ALLOW_ARTIFACT_COMMENT" = "true" ]; then args+=("--allow-artifact-comment"); fi
        if [ "$SR_INPUT_FAIL_ON_HIGH" = "true" ]; then args+=("--fail-on-high"); fi
        if [ "$SR_INPUT_FAIL_ON_MEDIUM" = "true" ]; then args+=("--fail-on-medium"); fi
        bun "$ACTION_PATH/scripts/security-review-ci.ts" "${args[@]}"

    - name: Upload security review results
      if: ${{ inputs.upload-results == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: pi-security-review-results
        path: |
          ${{ inputs.output }}
          ${{ inputs.markdown }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: ignore

    - name: Summarize outputs
      id: summary
      shell: bash
      run: |
        set -euo pipefail
        node <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require('node:fs');
        const path = process.env.RESULTS_FILE;
        const data = JSON.parse(fs.readFileSync(path, 'utf8'));
        const summary = data.report?.analysisSummary ?? {};
        const findings = Array.isArray(data.report?.findings) ? data.report.findings.length : 0;
        console.log(`findings_count=${findings}`);
        console.log(`high_count=${summary.highSeverity ?? 0}`);
        console.log(`medium_count=${summary.mediumSeverity ?? 0}`);
        console.log(`mode=${data.mode ?? 'unknown'}`);
        NODE
      env:
        RESULTS_FILE: ${{ inputs.output }}

branding:
  icon: "shield"
  color: "red"
